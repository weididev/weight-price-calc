name: Build Android APK (Cloud)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Code
        run: npm run build

      # Step 1: Initialize Android Project (Cloud Server par Android folder banayega)
      - name: Initialize Android
        run: |
          npm install @capacitor/android
          npx cap add android
          npx cap sync

      # Step 2: Inject AdMob App ID (Bina Laptop ke XML file edit karna)
      # Hum 'Test ID' use kar rahe hain. Jab Real ID lagani ho, to yahan change karein.
      - name: Configure AdMob in Manifest
        run: |
          sed -i 's|</application>|        <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-3940256099942544~3347511713"/>\n    </application>|' android/app/src/main/AndroidManifest.xml

      # Step 3: APK Build Karna
      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # Step 4: APK Upload Karna (Taaki aap download kar sako)
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WeightPrice-App-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
