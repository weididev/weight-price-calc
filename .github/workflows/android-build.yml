name: Build Android App (APK & AAB)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Code
        run: npm run build

      # Initialize Android Project
      - name: Initialize Android
        run: |
          npm install @capacitor/android
          npx cap add android
          npx cap sync

      # Inject AdMob App ID (Currently using Test ID)
      - name: Configure AdMob in Manifest
        run: |
          sed -i 's|</application>|        <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-3940256099942544~3347511713"/>\n    </application>|' android/app/src/main/AndroidManifest.xml

      # Build both APK and AAB (Debug versions)
      - name: Build APK and AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug bundleDebug

      # Upload both files so you can download them
      - name: Upload Artifacts (APK & AAB)
        uses: actions/upload-artifact@v4
        with:
          name: Android-Builds
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/bundle/debug/app-debug.aab
